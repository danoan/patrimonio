[tox]
env_list = ruff, format, type, py312
isolated_build = true

[testenv]
description = run unit + integration tests
extras = dev
commands = pytest {posargs}

[testenv:ruff]
description = lint
extras = dev
commands = ruff check .

[testenv:format]
description = verify formatting (no changes applied)
extras = dev
commands = ruff format --check .

[testenv:type]
description = static type check
extras = dev
commands = pyright
